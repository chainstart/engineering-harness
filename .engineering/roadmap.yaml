    "goal": "开发一个完善的可以长时间、自动化开发软件和智能体的母智能体 engineering-harness。它是开发其他系统的脚手架和约束工程智能体，接收一个总目标，然后在该总目标的指引下循环迭代地开发出目标所指向的系统；中间无需人工干预，能够长时间自动化运行。每次迭代完成后，对比现阶段工程状态和总目标的距离，提出下一阶段工作计划，循环往复地完成总目标。",
